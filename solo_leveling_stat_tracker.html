<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solo Leveling Stat Tracker</title>
<style>
body {
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: 40px auto;
    padding: 20px;
    background: #f4f4f4;
}
h1 {
    text-align: center;
    margin-bottom: 30px;
}
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
}
.stat {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: white;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    box-shadow: 0 1px 3px rgba(0,0,0,.15);
}
.controls {
    display: flex;
    align-items: center;
    gap: 8px;
}
button {
    width: 32px;
    height: 32px;
    font-size: 18px;
    cursor: pointer;
}
.value {
    min-width: 35px;
    text-align: center;
    font-weight: bold;
}
.reset-btn {
    width: auto;
    height: auto;
    padding: 10px 20px;
}
</style>
</head>
<body>

<h1>
    Level:
    <button onclick="changeStat('level',-1)">−</button>
    <span id="level">1</span>
    <button onclick="changeStat('level',1)">+</button>
</h1>

<div class="grid">
    <div>
        <div class="stat"><span>Strength</span><div class="controls"><button onclick="changeStat('strength',-1)">−</button><span class="value" id="strength">1</span><button onclick="changeStat('strength',1)">+</button></div></div>
        <div class="stat"><span>Agility</span><div class="controls"><button onclick="changeStat('agility',-1)">−</button><span class="value" id="agility">1</span><button onclick="changeStat('agility',1)">+</button></div></div>
        <div class="stat"><span>Perception</span><div class="controls"><button onclick="changeStat('perception',-1)">−</button><span class="value" id="perception">1</span><button onclick="changeStat('perception',1)">+</button></div></div>
    </div>

    <div>
        <div class="stat"><span>Vitality</span><div class="controls"><button onclick="changeStat('vitality',-1)">−</button><span class="value" id="vitality">1</span><button onclick="changeStat('vitality',1)">+</button></div></div>
        <div class="stat"><span>Intelligence (MP)</span><div class="controls"><button onclick="changeStat('intelligence',-1)">−</button><span class="value" id="intelligence">1</span><button onclick="changeStat('intelligence',1)">+</button></div></div>
        <div class="stat"><span>Unused Ability Points</span><div class="controls"><button onclick="changeStat('unused',-1)">−</button><span class="value" id="unused">0</span><button onclick="changeStat('unused',1)">+</button></div></div>
    </div>
</div>

<div style="text-align:center; margin-top:20px;">
    <button class="reset-btn" onclick="resetStats()">Reset Character</button>
</div>

<script>
const defaults = {
    level: 1,
    strength: 1,
    agility: 1,
    perception: 1,
    vitality: 1,
    intelligence: 1,
    unused: 0
};

let stats = JSON.parse(localStorage.getItem("soloStats")) || {...defaults};

function render() {
    for (const key in stats) {
        document.getElementById(key).textContent = stats[key];
    }
}

function save() {
    localStorage.setItem("soloStats", JSON.stringify(stats));
}

function changeStat(stat, amount) {
    if (stat === "level") {
        if (amount > 0) {
            stats.level += 1;
            stats.unused += 3;
        } else if (stats.level > 1) {
            stats.level -= 1;
            stats.unused = Math.max(0, stats.unused - 3);
        }
        save(); render(); return;
    }

    if (stat === "unused") {
        stats.unused = Math.max(0, stats.unused + amount);
        save(); render(); return;
    }

    if (amount > 0) {
        if (stats.unused > 0) {
            stats[stat] += 1;
            stats.unused -= 1;
        }
    }

    if (amount < 0 && stats[stat] > 1) {
        stats[stat] -= 1;
        stats.unused += 1;
    }

    save();
    render();
}

function resetStats() {
    if (confirm("Reset all stats to starting values?")) {
        stats = {...defaults};
        save();
        render();
    }
}

render();
</script>

</body>
</html>
